{% extends "base.html" %}
{% block title %}Reset Password | KPC Typing{% endblock %}
{% block body_class %}kpc-auth-page{% endblock %}
{% block content %}
<main class="kpc-page kpc-auth-shell"><section class="kpc-auth-panel">
  <div class="kpc-eyebrow">Secure reset</div><h1>Reset password</h1>
  {% if error %}<div class="kpc-alert kpc-alert-danger">{{ error }}</div>{% endif %}
  {% if message %}<div class="kpc-alert kpc-alert-success">{{ message }}</div>{% endif %}
  <form method="post" class="kpc-form"><input type="hidden" name="csrf_token" value="{{ csrf_token_value }}"><label>New password<input type="password" name="password" required minlength="8" autocomplete="new-password"></label><label>Confirm password<input type="password" name="confirm_password" required minlength="8" autocomplete="new-password"></label><button class="kpc-btn kpc-btn-primary kpc-btn-full" type="submit">Update Password</button></form>
  <div class="kpc-auth-links"><a href="/login">Back to login</a></div>
</section></main>
{% endblock %}
