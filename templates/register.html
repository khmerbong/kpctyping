<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Register | KPC Typing</title><link rel="manifest" href="/static/manifest.json"><meta name="theme-color" content="#075ce8">
<link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
</head>
<body>
<nav class="auth-nav"><a href="/"><span class="kpc-brand-mark">KPC<small>TYPING</small></span></a><div><a href="/landing">Home</a><a href="/landing#games">Games</a><a href="/typing-test">Typing Test</a><a href="/leaderboard">Leaderboard</a><a href="/login">Login</a></div></nav>
<main class="auth-shell"><section class="auth-card"><span class="auth-badge">Create Account</span><h1>Register</h1><p>Join us and start improving your typing</p>{% if error %}<div class="auth-error">{{ error }}</div>{% endif %}<form method="post" class="auth-form"><input type="hidden" name="csrf_token" value="{{ csrf_token_value }}"><label>Username<input name="username" required minlength="3" maxlength="30" autocomplete="username" placeholder="Choose a username"></label><label>Email<input name="email" type="email" autocomplete="email" placeholder="Enter your email"></label><label>Password<input name="password" type="password" required minlength="8" autocomplete="new-password" placeholder="Create a password"></label><label>Confirm Password<input name="confirm_password" type="password" required minlength="8" autocomplete="new-password" placeholder="Confirm your password"></label><button type="submit">Register</button></form><p class="auth-small">Already have an account? <a href="/login">Login here</a></p></section></main>

<script src="/static/js/theme-toggle.js" defer></script>
