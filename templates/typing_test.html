<script>
document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('gameOverlay');
  const playBtn = document.getElementById('overlayPlayBtn');
  if (!overlay || !playBtn) return;

  const startSelectors = [
    '#spaceStart',
    '#spaceStartBtn',
    '#startBtn',
    '#startGame',
    '#startGameBtn',
    '#startTyping',
    '#startTest',
    '#typingStart',
    '#zombieStart',
    '#vampireStart',
    'button[data-start-game]'
  ];

  function getStartButton(){
    for (const sel of startSelectors){
      const el = document.querySelector(sel);
      if (el) return el;
    }
    // fallback: find button whose text looks like start/restart/play
    const buttons = Array.from(document.querySelectorAll('button'));
    return buttons.find(b => /start|play|mission|test/i.test((b.textContent || '').trim()) && b.id !== 'overlayPlayBtn') || null;
  }

  function hideOldStartButtons(){
    const old = getStartButton();
    if (old) {
      old.classList.add('old-start-hidden');
      old.setAttribute('aria-hidden','true');
      old.tabIndex = -1;
    }
  }

  function startGameFromOverlay(){
    overlay.style.display = 'none';
    const old = getStartButton();
    if (old) old.click();

    // focus likely game input
    setTimeout(() => {
      const input = document.querySelector(
        '#spaceInput,#zombieInput,#vampireInput,#typingInput,#wordInput,input[type="text"],input:not([type])'
      );
      if (input) input.focus();
    }, 120);
  }

  playBtn.onclick = startGameFromOverlay;
  hideOldStartButtons();

  window.showGameOverlay = function(title, msg){
    overlay.style.display = 'flex';
    const titleEl = document.getElementById('overlayTitle');
    const subEl = document.getElementById('overlaySubtitle');
    if (titleEl) titleEl.textContent = title || 'GAME OVER';
    if (subEl) subEl.textContent = msg || 'Try again and beat your score.';
    playBtn.textContent = /over|again/i.test(title || '') ? 'PLAY AGAIN' : 'Start';
    hideOldStartButtons();
  };

  // Keep old start hidden even after game scripts re-render/update.
  setInterval(hideOldStartButtons, 1000);
});
</script>
